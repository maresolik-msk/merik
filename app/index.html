<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merik</title>
<link rel="icon" type="image/png" href="../assets/images/logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --navy:#1B3A6B;--deep:#14284B;--mid:#2563A8;--lblue:#D6E4F7;--orange:#D93A31;
  --bg:#F5F7FB;--card:#ffffff;--line:#E7ECF4;--ink:#1E2A3F;--muted:#6B7A90;
  --green:#1E8449;--red:#C0392B;--radius:14px;
  --shadow:0 1px 2px rgba(20,40,75,.04),0 6px 20px rgba(20,40,75,.06);
  --shadow-lg:0 18px 50px rgba(20,40,75,.14);
}
/* ============ DARK THEME ============ */
:root[data-theme="dark"]{
  --bg:#0f1420;--card:#1a2333;--line:#2a3547;--ink:#e7edf7;--muted:#98a6bf;--lblue:#233150;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.4);--shadow-lg:0 22px 55px rgba(0,0,0,.55);
}
[data-theme="dark"] h1,[data-theme="dark"] h2,[data-theme="dark"] h3{color:#e9eef8}
[data-theme="dark"] table{background:var(--card)}
[data-theme="dark"] th{background:#212c40;color:#c3d3ee;border-bottom:2px solid #2b3a54}
[data-theme="dark"] td{border-bottom-color:#28324a;color:var(--ink)}
[data-theme="dark"] tr:nth-child(even) td{background:#1e2839}
[data-theme="dark"] tbody tr:hover td{background:#243149}
[data-theme="dark"] #tasktbl tr:hover td{background:#243149}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:#131b29;color:var(--ink);border-color:#31405a}
[data-theme="dark"] input::placeholder,[data-theme="dark"] textarea::placeholder{color:#6b7c98}
[data-theme="dark"] .btn.sec{background:#243149;color:#dbe6f8;border-color:#34435f}
[data-theme="dark"] .btn.sec:hover{background:#2b3a54;color:#fff}
[data-theme="dark"] .card{background:var(--card);border-color:var(--line)}
[data-theme="dark"] .tl-icon-btn,[data-theme="dark"] .pg-btn,[data-theme="dark"] .tl-go{background:#1a2333;color:#cdd9ee;border-color:#34435f}
[data-theme="dark"] .pg-btn:hover:not(:disabled),[data-theme="dark"] .tl-icon-btn:hover,[data-theme="dark"] .tl-go:hover{background:#243149}
[data-theme="dark"] .pg-btn.on{background:#2563A8;border-color:#2563A8;color:#fff}
[data-theme="dark"] .tl-name{color:#e7edf7}
[data-theme="dark"] .auth-panel{background:#141c2a}
[data-theme="dark"] .auth-tabs{background:#1f2a3d}
[data-theme="dark"] .auth-tabs button.on{background:#2b3a54;color:#fff}
[data-theme="dark"] .auth-panel h2{color:#e9eef8}
[data-theme="dark"] .modal{background:rgba(4,8,16,.6)}
/* Remap the most common inline (hardcoded) colours so dark stays readable */
[data-theme="dark"] [style*="color:#14284B"],[data-theme="dark"] [style*="color:#14284b"]{color:#e7edf7 !important}
[data-theme="dark"] [style*="color:#1B3A6B"],[data-theme="dark"] [style*="color:#1b3a6b"]{color:#cfe0f5 !important}
[data-theme="dark"] [style*="color:#6b7a90"],[data-theme="dark"] [style*="color:#6B7A90"],[data-theme="dark"] [style*="color:#667"],[data-theme="dark"] [style*="color:#6b7c98"]{color:#9fb0c8 !important}
[data-theme="dark"] [style*="color:#889"],[data-theme="dark"] [style*="color:#99a"],[data-theme="dark"] [style*="color:#9aa8bc"]{color:#8a99b3 !important}
[data-theme="dark"] [style*="color:#41506a"],[data-theme="dark"] [style*="color:#445"]{color:#c3d0e6 !important}
[data-theme="dark"] [style*="background:#fff"],[data-theme="dark"] [style*="background:#FAFBFE"],[data-theme="dark"] [style*="background:#fafbfe"]{background:#1a2333 !important}
/* Theme switcher in the sidebar */
.themesw{display:flex;gap:4px;background:rgba(255,255,255,.08);border-radius:9px;padding:4px;margin:2px 12px 8px}
.themesw button{flex:1;background:transparent;border:none;color:#9fb2d4;padding:6px;border-radius:7px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;box-shadow:none}
.themesw button.on{background:rgba(255,255,255,.16);color:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-size:14px;font-family:'Inter',-apple-system,'Segoe UI',Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
button{cursor:pointer;font-family:inherit}

/* ---- Buttons ---- */
.btn{background:var(--deep);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;box-shadow:0 2px 6px rgba(20,40,75,.18)}
.btn:hover{background:#0f1f3c;transform:translateY(-1px);box-shadow:0 6px 16px rgba(20,40,75,.26)}
.btn:active{transform:translateY(0)}
.btn.sec{background:#EEF2F9;color:var(--navy);box-shadow:none;border:1px solid var(--line)}
.btn.sec:hover{background:#e4ebf6;color:var(--navy)}
.btn.warn{background:var(--orange);box-shadow:0 2px 8px rgba(232,104,42,.3)}
.btn.warn:hover{background:#d75b20}
.btn.sm{padding:5px 11px;font-size:12px;border-radius:8px}

/* ---- Forms ---- */
input,select,textarea{padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;width:100%;font-family:inherit;color:var(--ink);background:#fff;transition:border-color .12s ease,box-shadow .12s ease}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--mid);box-shadow:0 0 0 3px rgba(37,99,168,.14)}
input::placeholder,textarea::placeholder{color:#9aa8bf}
label{font-size:11.5px;font-weight:600;color:var(--muted);display:block;margin:10px 0 4px;letter-spacing:.2px}

/* ---- Tables ---- */
table{border-collapse:separate;border-spacing:0;width:100%;background:#fff;border-radius:12px;overflow:hidden}
th{background:#F1F5FC;color:var(--navy);padding:11px 10px;font-size:11.5px;font-weight:700;text-align:left;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;border-bottom:2px solid #E1E9F5;z-index:1}
table tr th:first-child{border-top-left-radius:12px}table tr th:last-child{border-top-right-radius:12px}
td{padding:10px;border-bottom:1px solid #EEF2F8;font-size:13px;color:var(--ink)}
tbody tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#FAFBFE}
tbody tr:hover td{background:#F1F6FD}

/* ---- Cards ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.pghead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.pghead h2{margin-bottom:3px;font-size:23px;letter-spacing:-.4px}
.sub{color:var(--muted);font-size:13.5px}
.kicon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:var(--shadow);color:#14284B}
.kicon i{font-size:22px}
#side a .ic i{font-size:15px}
.btn i{font-size:12.5px}
.av2{display:inline-flex;width:30px;height:30px;border-radius:50%;align-items:center;justify-content:center;font-weight:700;font-size:11.5px;margin-right:8px;vertical-align:middle;color:#fff;background:var(--mid)}
.lgd{display:inline-flex;align-items:center;gap:6px;margin-right:14px;font-size:12.5px;color:#4a5a72}
.lgd b{display:inline-flex;width:22px;height:22px;border-radius:6px;align-items:center;justify-content:center;font-size:11px}
.pchip{display:inline-flex;align-items:center;gap:6px;background:var(--lblue);color:var(--navy);font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;margin:0 6px 6px 0}

/* ---- Layout ---- */
#app{display:flex;height:100vh;overflow:hidden}
#side{width:252px;background:linear-gradient(185deg,#0B1B36 0%,#0D2044 100%);color:#fff;flex-shrink:0;display:flex;flex-direction:column;height:100vh}
#side .navscroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding-bottom:8px}
#side .navscroll::-webkit-scrollbar{width:8px}
#side .navscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:8px}
#side .navscroll::-webkit-scrollbar-track{background:transparent}
#side .navscroll{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent}
#side .brand{display:flex;align-items:center;gap:12px;padding:22px 20px;font-size:20px;font-weight:800;letter-spacing:.4px;border-bottom:1px solid rgba(255,255,255,.09)}
#side .brand img{height:34px;border-radius:8px}
#side .grp{font-size:10.5px;font-weight:700;letter-spacing:1.6px;color:#6079A3;padding:16px 22px 6px;text-transform:uppercase}
#side a{display:flex;align-items:center;gap:12px;color:#C3D2EA;padding:10px 14px;margin:2px 12px;text-decoration:none;font-size:14px;font-weight:500;border-radius:10px;border-left:3px solid transparent;transition:background .12s ease,color .12s ease}
#side a .ic{width:22px;text-align:center;font-size:15px}
#side a:hover{background:rgba(255,255,255,.07);color:#fff}
#side a.act{background:linear-gradient(90deg,rgba(232,104,42,.22),rgba(29,63,122,.35));color:#fff;border-left:3px solid var(--orange);box-shadow:0 2px 10px rgba(0,0,0,.28);font-weight:600}
#side .sep{border-top:1px solid rgba(255,255,255,.08);margin:10px 18px}
#side a.sout{color:#FF6B7A;font-weight:700}
#side .ufoot{margin-top:auto;display:flex;align-items:center;gap:12px;padding:14px 20px;border-top:1px solid rgba(255,255,255,.09);background:rgba(0,0,0,.2)}
#side .ufoot .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#24406e,#2f5290);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff}
#side .ufoot .nm{font-size:12.5px;color:#EAF1FC;line-height:1.4;font-weight:600}
#side .ufoot .rl{font-size:11px;color:#8298BC;font-weight:400}
#main{flex:1;padding:26px 30px;overflow-y:auto;overflow-x:hidden;height:100vh}
/* ---- Mobile top bar + drawer ---- */
#topbar{display:none;align-items:center;gap:12px;height:56px;padding:0 14px;background:linear-gradient(90deg,#0B1B36,#0D2044);color:#fff;position:fixed;top:0;left:0;right:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.25)}
#topbar #hamb{background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:10px;font-size:18px;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:none;padding:0}
#topbar img{height:28px;border-radius:6px}
#topbar .tb-name{font-weight:700;font-size:16px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#overlay{display:none;position:fixed;inset:0;background:rgba(8,16,32,.5);z-index:55}
#side .side-close{display:none}
@media(max-width:768px){
  #topbar{display:flex}
  #overlay.show{display:block}
  #app{display:block;height:auto;overflow:visible}
  #side{position:fixed;top:0;left:0;bottom:0;width:270px;max-width:82vw;transform:translateX(-100%);transition:transform .25s ease;z-index:60;height:100vh}
  #side.open{transform:none;box-shadow:6px 0 30px rgba(0,0,0,.4)}
  #side .side-close{display:flex;position:absolute;top:16px;right:14px;background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:9px;align-items:center;justify-content:center;font-size:16px;cursor:pointer}
  #main{height:auto;min-height:100vh;padding:72px 16px 28px}
  .row>div{min-width:0}
  .kpi .card{min-width:calc(50% - 7px)}
  .pghead{flex-wrap:wrap;gap:10px}
  table{font-size:12.5px}
}
@media(max-width:440px){.kpi .card{min-width:100%}}
/* ---- Task Log redesign ---- */
.tl-sub{font-size:11.5px;color:#94a3b8;font-weight:500;line-height:1.3}
.tl-name{font-weight:700;color:#14284B;line-height:1.3}
.tl-toolbar{display:flex;align-items:center;gap:10px;margin:16px 0 4px}
.tl-search{flex:1;position:relative}
.tl-search i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:13px}
.tl-search input{padding-left:38px;margin:0}
.tl-icon-btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;color:#41506a;padding:10px 15px;border-radius:11px;font-weight:600;font-size:13.5px;cursor:pointer;box-shadow:none;white-space:nowrap}
.tl-icon-btn:hover{background:#F1F5FC}
.tl-thumb{width:32px;height:32px;border-radius:8px;background:#E8EEFB;color:#2563A8;display:inline-flex;align-items:center;justify-content:center;font-size:13px;border:1px solid #D6E0F0;text-decoration:none}
.tl-plus{font-size:11px;color:#6b7a90;font-weight:700;margin-left:2px}
.tl-chip-warn{background:#FFF3E5;color:#B45309;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tl-next-red{color:#C0392B;font-weight:600}
.tl-go{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:#fff;color:#2563A8;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:none;padding:0}
.tl-go:hover{background:#EEF4FF;border-color:#c7d6ef}
.tl-dash{color:#c2ccda}
.tl-time{display:inline-flex;align-items:center;gap:4px;background:#EEF4FF;color:#2563A8;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;white-space:nowrap}
[data-theme="dark"] .tl-time{background:#1e2c44;color:#8fb4e8}
/* ---- Project Intelligence redesign ---- */
.pi-datepill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--card);color:#41506a;padding:9px 14px;border-radius:11px;font-weight:600;font-size:13.5px;white-space:nowrap}
.pi-toolbar{display:flex;align-items:center;gap:12px;margin:16px 0;flex-wrap:wrap}
.pi-tabs{display:flex;background:#EEF2F9;border-radius:11px;padding:4px}
.pi-tabs button{background:transparent;border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;color:#6b7a90;box-shadow:none}
.pi-tabs button.on{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(20,40,75,.12)}
[data-theme="dark"] .pi-tabs{background:#1f2a3d}[data-theme="dark"] .pi-tabs button.on{background:#2b3a54;color:#fff}
.pi-views{display:flex;gap:4px;background:#EEF2F9;border-radius:10px;padding:4px}
.pi-views button{width:34px;height:32px;border:none;background:transparent;color:#8896aa;border-radius:8px;box-shadow:none;display:flex;align-items:center;justify-content:center}
.pi-views button.on{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(20,40,75,.12)}
[data-theme="dark"] .pi-views{background:#1f2a3d}[data-theme="dark"] .pi-views button.on{background:#2b3a54;color:#fff}
.pi-card{margin:0;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease}
.pi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.pi-chip{display:inline-block;background:#EEF2F9;color:#41506a;font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;margin:0 4px 4px 0}
[data-theme="dark"] .pi-chip{background:#243149;color:#c3d0e6}
.pi-avstack{display:inline-flex;align-items:center}
.pi-avstack .av2{margin-left:-9px;border:2px solid var(--card);width:28px;height:28px}
.pi-avstack .av2:first-child{margin-left:0}
.pi-avmore{margin-left:4px;font-size:11.5px;font-weight:700;color:#6b7a90}
/* journey stepper */
.pj{display:flex;align-items:center;margin-top:12px}
.pj-node{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);background:var(--card);flex:none;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff}
.pj-conn{flex:1;height:2px;background:var(--line);border-radius:2px}
.pj-lbls{display:flex;margin-top:6px}
.pj-lbls>span{flex:1;font-size:10.5px;color:#94a3b8;text-align:center}
.pj-lbls>span:first-child{text-align:left}
.pj-lbls>span:last-child{text-align:right}
.pj-lbls>span.cur{color:#2563A8;font-weight:700}
.tl-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:14px 4px 2px;font-size:13px;color:#6b7a90}
.tl-pages{display:flex;align-items:center;gap:6px}
.pg-btn{min-width:36px;height:36px;border:1px solid var(--line);background:#fff;border-radius:10px;font-weight:600;color:#41506a;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;box-shadow:none;padding:0}
.pg-btn:hover:not(:disabled){background:#F1F5FC}
.pg-btn.on{background:var(--deep);color:#fff;border-color:var(--deep)}
.pg-btn:disabled{opacity:.4;cursor:default}
.pg-dot{color:#9aa8bc;padding:0 2px}
.tl-ps{width:auto;margin:0;padding:8px 10px}
#tasktbl td{vertical-align:middle;padding:14px 12px}
#tasktbl tr:hover td{background:#FAFBFE}
h2{color:var(--navy);margin-bottom:12px;font-size:20px;letter-spacing:-.3px}
.btn[disabled]{opacity:.45;cursor:default;transform:none;box-shadow:none}
.pager{display:flex;align-items:center;justify-content:flex-end;gap:14px;flex-wrap:wrap;margin:-4px 0 18px}
.pager .pinfo{font-size:12.5px;color:var(--muted);font-weight:600}

/* ---- Rows / status ---- */
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.row>div{flex:1;min-width:130px}
.badge{padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;display:inline-block;line-height:1.6}
.stP{background:#D5F5E3;color:#1E8449}.stA{background:#FADBD8;color:#C0392B}.stL{background:#FDEBD0;color:#D35400}
.stH{background:#D6EAF8;color:#1F618D}.stW{background:#E8DAEF;color:#6C3483}.stOL{background:#FFF0E0;color:#B7600A}.stUL{background:#F2D7D5;color:#7B241C}

/* ---- Modal ---- */
.modal{position:fixed;inset:0;background:rgba(11,27,54,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal .card{width:640px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg);margin:0}

/* ---- Attendance grid ---- */
.grid-att td{text-align:center;padding:2px;min-width:26px;font-weight:700;font-size:11px}
.wke{background:#EEF0F5!important;color:#6B7FA3}
.hol{background:#FFE8E8!important;color:#8B0000}

/* ---- KPI ---- */
.kpi{display:flex;gap:14px;flex-wrap:wrap}
.kpi .card{flex:1;min-width:150px;text-align:center;margin:0;transition:transform .15s ease,box-shadow .15s ease}
.kpi .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.kpi .n{font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-.5px}

/* ---- Login ---- */
#login{max-width:380px;margin:90px auto;padding:32px;border-radius:18px;box-shadow:var(--shadow-lg);border-top:4px solid var(--orange)}
/* ---- Auth (login / signup) ---- */
.auth-wrap{min-height:100vh;display:flex;align-items:stretch;background:#F4F7FC}
.auth-brand{flex:1;background:linear-gradient(150deg,#14284B 0%,#1B3A6B 55%,#2563A8 100%);color:#fff;padding:56px 48px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.auth-brand:before{content:"";position:absolute;top:-120px;right:-120px;width:340px;height:340px;border-radius:50%;background:rgba(217,58,49,.22)}
.auth-brand:after{content:"";position:absolute;bottom:-140px;left:-90px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.06)}
.auth-brand .inner{position:relative;z-index:1;max-width:440px}
.auth-brand h1{color:#fff;font-size:38px;line-height:1.15;letter-spacing:-.6px;margin:18px 0 14px}
.auth-brand p{color:#cfe0f5;font-size:15px;line-height:1.6}
.auth-feat{margin-top:28px;display:flex;flex-direction:column;gap:14px}
.auth-feat div{display:flex;align-items:center;gap:12px;font-size:14.5px;color:#eaf1fb}
.auth-feat i{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#fff;flex:none}
.auth-panel{width:min(460px,100%);background:#fff;padding:48px 44px;display:flex;flex-direction:column;justify-content:center;box-shadow:-20px 0 60px rgba(20,40,75,.08)}
.auth-back{display:inline-flex;align-items:center;gap:7px;color:#6b7a90;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:18px;transition:color .15s ease}
.auth-back:hover{color:var(--navy)}
.auth-tabs{display:flex;background:#EEF2F9;border-radius:12px;padding:5px;margin-bottom:24px}
.auth-tabs button{flex:1;background:transparent;border:none;padding:10px;border-radius:9px;font-weight:700;font-size:14px;color:#6b7a90;cursor:pointer;transition:all .15s ease;box-shadow:none}
.auth-tabs button.on{background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(20,40,75,.12)}
.auth-panel h2{font-size:23px;margin-bottom:4px}
.auth-panel .sub{color:#6b7a90;font-size:13.5px;margin-bottom:22px}
.auth-panel label{margin-top:14px}
.auth-msg{margin-top:14px;font-size:13px;padding:11px 14px;border-radius:9px;display:none}
.auth-msg.err{display:block;background:#FDECEA;color:#B42318;border-left:4px solid var(--orange)}
.auth-msg.ok{display:block;background:#E6F7EC;color:#1E6B3A;border-left:4px solid #1E8449}
.auth-full{width:100%;justify-content:center;padding:12px;font-size:15px;margin-top:22px}
@media(max-width:840px){.auth-brand{display:none}.auth-panel{width:100%;box-shadow:none;margin:0 auto}}
.warnbar{background:#FFF3E5;color:#A34A00;border-left:4px solid var(--orange);padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px}

/* ---- Print ---- */
@media print{#side,.noprint{display:none!important}#main{padding:0}body{background:#fff}#docsheet{outline:none!important}}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
.payslip{background:#fff;border:1px solid #90A4AE;max-width:800px;margin:auto;padding:0}
.payslip .hd{background:#1B3A6B;color:#fff;text-align:center;font-weight:800;padding:10px;font-size:18px}
.payslip table{width:100%;border-radius:0}.payslip td,.payslip th{border:1px solid #90A4AE;padding:6px 8px}
.payslip th{background:#1B3A6B;color:#fff;position:static;text-transform:none;letter-spacing:0}
</style>

/* ---- Theme: light / dark / system (per-user, saved locally) ---- */
const THEME_KEY='merik-theme';
const _mql=window.matchMedia('(prefers-color-scheme: dark)');
function themeMode(){return localStorage.getItem(THEME_KEY)||'system'}
function applyTheme(){const m=themeMode();const dark=m==='dark'||(m==='system'&&_mql.matches);
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.querySelectorAll('.themesw button').forEach(b=>b.classList.toggle('on',b.dataset.m===m));}
function setTheme(m){localStorage.setItem(THEME_KEY,m);applyTheme()}
function themeSwitch(){const b=(m,ic,l)=>`<button data-m="${m}" onclick="setTheme('${m}')" title="${l}"><i class="fa-solid ${ic}"></i></button>`;
  return `<div class="themesw noprint">${b('light','fa-sun','Light')}${b('dark','fa-moon','Dark')}${b('system','fa-desktop','System')}</div>`;}
_mql.addEventListener('change',()=>{if(themeMode()==='system')applyTheme()});
applyTheme();

const LOGO='../assets/images/logo.png';
let ME=null; // {user, profile, employee}
const $=id=>document.getElementById(id);
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const inr=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{if(!d)return '—';const p=String(d).slice(0,10).split('-');return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:d;};
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function words(n){n=Math.round(n);if(n===0)return'Zero';const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
const two=x=>x<20?a[x]:b[Math.floor(x/10)]+(x%10?' '+a[x%10]:'');
const three=x=>x>99?a[Math.floor(x/100)]+' Hundred'+(x%100?' '+two(x%100):''):two(x);
let s='';if(n>=10000000){s+=three(Math.floor(n/10000000))+' Crore ';n%=10000000}
if(n>=100000){s+=three(Math.floor(n/100000))+' Lakh ';n%=100000}
if(n>=1000){s+=three(Math.floor(n/1000))+' Thousand ';n%=1000}
if(n)s+=three(n);return s.trim()}
const AVC=['#F26522','#2563A8','#16A085','#8E44AD','#C0392B','#D35400','#0E7C86','#27AE60'];
function av(n){n=(n||'?').trim()||'?';const pr=n.split(/\s+/);const ini=((pr[0][0]||'')+(pr[1]?.[0]||'')).toUpperCase();
  const c=AVC[(n.charCodeAt(0)+n.length)%AVC.length];
  return `<span class="av2" style="background:${c}22;color:${c}">${ini}</span>`}
function pgh(t,sub,action){return `<div class="pghead"><div><h2>${t}</h2><div class="sub">${sub}</div></div><div class="noprint">${action||''}</div></div>`}
function kpis(arr){return `<div class="kpi" style="margin-bottom:16px">${arr.map(([ic,bg,label,val,sub,vid])=>`<div class="card" style="display:flex;gap:14px;align-items:center;margin:0"><div class="kicon" style="background:${bg}">${ic}</div><div style="text-align:left"><div style="font-size:12.5px;color:#6b7a90">${label}</div><div ${vid?`id="${vid}"`:''} style="font-size:21px;font-weight:800;color:#14284B">${val}</div>${sub?`<div style="font-size:11.5px;color:#9aa8bc">${sub}</div>`:''}</div></div>`).join('')}</div>`}

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){renderLogin();return}
  const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  // Merik super admin is product-level: no tenant org, goes straight to the product console.
  if(prof?.role==='superadmin'){ME={user:session.user,profile:prof,employee:null,org:{name:'Merik'}};renderShell();return}
  if(!prof||!prof.org_id){renderNoOrg(session.user);return}
  let emp=null,org=null;
  if(prof.employee_id){const{data}=await sb.from('employees').select('*').eq('id',prof.employee_id).single();emp=data}
  const{data:o}=await sb.from('orgs').select('*').eq('id',prof.org_id).single();org=o;
  ME={user:session.user,profile:prof,employee:emp,org:org||{name:'Workspace'}};
  renderShell();
}
function renderNoOrg(user){
  $('root').innerHTML=`<div id="login" class="card"><h2 style="text-align:center">Create your company workspace</h2>
  <p style="font-size:13px;color:#667;margin:8px 0">Signed in as <b>${esc(user.email)}</b>. This email isn't linked to any company yet — create a new workspace (you'll be its admin), or ask your admin to add this email to their Employee list, then sign out and back in.</p>
  <label>Company Name</label><input id="conm" placeholder="e.g. Acme Inc.">
  <div style="margin-top:12px;display:flex;gap:8px"><button class="btn" style="flex:1" onclick="createOrg()">Create Workspace</button>
  <button class="btn sec" onclick="logout()">Sign out</button></div>
  <p id="lerr" style="color:var(--red);margin-top:8px;font-size:12px"></p></div>`;
}
async function createOrg(){
  const{error}=await sb.rpc('create_org',{org_name:$('conm').value.trim()||'My Company'});
  if(error){$('lerr').textContent=error.message;return}boot();
}
let AUTH_TAB='login';
function renderLogin(tab){
  AUTH_TAB=tab||AUTH_TAB||'login';
  const brand=`<div class="auth-brand"><div class="inner">
    <img src="${LOGO}" alt="Merik" style="height:52px;filter:brightness(0) invert(1)">
    <h1>The complete workforce suite for growing teams.</h1>
    <p>Attendance, payroll, projects, feedback and more — all in one clean workspace built for your company.</p>
    <div class="auth-feat">
      <div><i class="fa-solid fa-fingerprint"></i> Geo check-in &amp; attendance tracking</div>
      <div><i class="fa-solid fa-money-bill-wave"></i> Automated payroll &amp; payslips</div>
      <div><i class="fa-solid fa-diagram-project"></i> Projects, clients &amp; task logs</div>
    </div></div></div>`;
  const tabs=`<a href="../index.html" class="auth-back"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
  <div class="auth-tabs">
    <button class="${AUTH_TAB==='login'?'on':''}" onclick="renderLogin('login')">Sign In</button>
    <button class="${AUTH_TAB==='signup'?'on':''}" onclick="renderLogin('signup')">Request Access</button></div>`;
  const login=`<h2>Welcome back</h2><div class="sub">Sign in to your Merik workspace.</div>
    <label>Email</label><input id="lem" type="email" placeholder="you@company.com" onkeydown="if(event.key==='Enter')doLogin()">
    <label>Password</label><input id="lpw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn auth-full" onclick="doLogin()">Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
    <div id="lerr" class="auth-msg"></div>
    <p style="font-size:12px;color:#889;margin-top:16px">Employees: use the email &amp; password your admin created for you.</p>`;
  const signup=`<h2>Register your company</h2><div class="sub">Tell us about your business — the Merik team will review and approve your workspace.</div>
    <div class="row"><div><label>Company name</label><input id="su_company" placeholder="Acme Inc."></div>
    <div><label>Your name</label><input id="su_contact" placeholder="Jane Doe"></div></div>
    <div class="row"><div><label>Work email</label><input id="su_email" type="email" placeholder="jane@acme.com"></div>
    <div><label>Phone (optional)</label><input id="su_phone" placeholder="+91 …"></div></div>
    <label>Anything we should know? (optional)</label><textarea id="su_msg" rows="2" placeholder="Team size, what you need Merik for…"></textarea>
    <button class="btn auth-full" onclick="submitSignup()"><i class="fa-solid fa-paper-plane"></i> Submit for approval</button>
    <div id="serr" class="auth-msg"></div>
    <p style="font-size:12px;color:#889;margin-top:16px">After approval, you'll receive your admin login credentials from the Merik team.</p>`;
  $('root').innerHTML=`<div class="auth-wrap">${brand}<div class="auth-panel">${tabs}${AUTH_TAB==='login'?login:signup}<div style="margin-top:22px;display:flex;justify-content:center;gap:6px">${['light','dark','system'].map(m=>`<button class="tl-icon-btn" style="padding:7px 12px;font-size:12px" onclick="setTheme('${m}')"><i class="fa-solid ${m==='light'?'fa-sun':m==='dark'?'fa-moon':'fa-desktop'}"></i> ${m[0].toUpperCase()+m.slice(1)}</button>`).join('')}</div></div></div>`;
  applyTheme();
}
function authMsg(id,type,text){const el=$(id);if(!el)return;el.className='auth-msg '+type;el.textContent=text}
async function doLogin(){
  const email=($('lem').value||'').trim();const pw=$('lpw').value||'';
  if(!email||!pw)return authMsg('lerr','err','Enter your email and password.');
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error)return authMsg('lerr','err',error.message);boot()}
async function submitSignup(){
  const o={company_name:($('su_company').value||'').trim(),contact_name:($('su_contact').value||'').trim(),
    email:($('su_email').value||'').trim(),phone:($('su_phone').value||'').trim()||null,message:($('su_msg').value||'').trim()||null,status:'Pending'};
  if(!o.company_name||!o.contact_name||!o.email)return authMsg('serr','err','Company, your name and email are required.');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(o.email))return authMsg('serr','err','Please enter a valid email address.');
  const{error}=await sb.from('signup_requests').insert(o);
  if(error)return authMsg('serr','err',error.message);
  $('root').querySelector('.auth-panel').innerHTML=`<div style="text-align:center">

const PAGE_SIZE=10;
const FILTER_MIN=4; // add a search/filter box to any data table with at least this many rows
// Numbered page buttons (‹ 1 2 … N ›) for the generic table pager; buttons carry data-p.
function pgBtns(pages,cur){const b=(i,l,dis,on)=>`<button class="pg-btn ${on?'on':''}" ${dis?'disabled':''} data-p="${i}">${l}</button>`;
  let out=b(cur-1,'‹',cur===0);let win=[];
  if(pages<=7){for(let i=0;i<pages;i++)win.push(i);}else{win.push(0);const s=Math.max(1,cur-1),e=Math.min(pages-2,cur+1);if(s>1)win.push('…');for(let i=s;i<=e;i++)win.push(i);if(e<pages-2)win.push('…');win.push(pages-1);}
  win.forEach(i=>out+=(i==='…'?'<span class="pg-dot">…</span>':b(i,i+1,false,i===cur)));
  return out+b(cur+1,'›',cur>=pages-1);}
// Numbered page buttons that call a named setter, for custom (re-rendering) views.
function pageBtnsFn(pages,cur,fn){const b=(i,l,dis,on)=>`<button class="pg-btn ${on?'on':''}" ${dis?'disabled':''} onclick="${fn}(${i})">${l}</button>`;
  let out=b(cur-1,'‹',cur===0);let win=[];
  if(pages<=7){for(let i=0;i<pages;i++)win.push(i);}else{win.push(0);const s=Math.max(1,cur-1),e=Math.min(pages-2,cur+1);if(s>1)win.push('…');for(let i=s;i<=e;i++)win.push(i);if(e<pages-2)win.push('…');win.push(pages-1);}
  win.forEach(i=>out+=(i==='…'?'<span class="pg-dot">…</span>':b(i,i+1,false,i===cur)));
  return out+b(cur+1,'›',cur>=pages-1);}
function paginateTables(){
  document.querySelectorAll('#main table').forEach(tb=>{
    if(tb.classList.contains('grid-att')||tb.classList.contains('nopg')||tb.id==='ditems'||tb.id==='tasktbl')return;
    if(tb.closest('.payslip')||tb.closest('#docsheet')||tb.closest('.modal'))return;
    const rows=[...tb.rows].filter(r=>r.cells[0]&&r.cells[0].tagName==='TD');
    if(rows.length<FILTER_MIN)return;
    const host=tb.closest('.card')||tb;
    let filter='',page=0;
    // Match on visible text plus any input/select/textarea values in the row.
    const rowText=r=>{let t=r.textContent.toLowerCase();
      r.querySelectorAll('input,select,textarea').forEach(el=>{const v=el.value||(el.selectedOptions&&el.selectedOptions[0]?.text)||'';t+=' '+v.toLowerCase()});return t};
    const visible=()=>filter?rows.filter(r=>rowText(r).includes(filter)):rows;
    const fbox=document.createElement('div');fbox.className='tfilter noprint';
    fbox.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px';
    fbox.innerHTML=`<span style="color:#8896aa"><i class="fa-solid fa-magnifying-glass"></i></span>`+
      `<input type="search" placeholder="Filter…" style="max-width:280px;margin:0">`;
    const input=fbox.querySelector('input');
    let pageSize=PAGE_SIZE;
    const pager=document.createElement('div');pager.className='tl-foot noprint';
    const draw=()=>{
      const vis=visible();const pages=Math.max(1,Math.ceil(vis.length/pageSize));
      if(page>=pages)page=pages-1;if(page<0)page=0;
      rows.forEach(r=>r.style.display='none');
      vis.forEach((r,i)=>{if(i>=page*pageSize&&i<(page+1)*pageSize)r.style.display=''});
      const from=vis.length?page*pageSize+1:0,to=Math.min((page+1)*pageSize,vis.length);
      pager.innerHTML=`<span>Showing ${from} to ${to} of ${vis.length} entries${filter?` (filtered from ${rows.length})`:''}</span>`+
        `<div class="tl-pages">${pgBtns(pages,page)}</div>`+
        `<select class="tl-ps">${[10,25,50].map(n=>`<option ${pageSize===n?'selected':''} value="${n}">${n} / page</option>`).join('')}</select>`;
    };
    input.addEventListener('input',()=>{filter=input.value.trim().toLowerCase();page=0;draw()});
    pager.addEventListener('click',e=>{const b=e.target.closest('.pg-btn');if(!b||b.disabled)return;page=+b.dataset.p;draw();});
    pager.addEventListener('change',e=>{if(e.target.matches('.tl-ps')){pageSize=+e.target.value;page=0;draw();}});
    host.before(fbox);host.after(pager);draw();
  });
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result).split(',')[1]||'');
    r.onerror=()=>reject(new Error('Could not read the file'));
    r.readAsDataURL(file);
  });
}

// Effective monthly CTC for a given month: latest revision effective on/before month-end,
// else the earliest revision's previous CTC, else the employee's current CTC.
function effectiveCtc(hist,ym,fallback){
  if(!hist||!hist.length)return +fallback||0;
  const end=`${ym}-31`;const sorted=[...hist].sort((a,b)=>a.effective_month<b.effective_month?-1:1);
  if(end<sorted[0].effective_month)return sorted[0].previous_ctc!=null?+sorted[0].previous_ctc:(+fallback||0);
  let ctc=null;for(const h of sorted){if(h.effective_month<=end)ctc=+h.new_ctc;else break;}
  return ctc!=null?ctc:(+fallback||0);
}

const TASK_ITEM_STATUS=['Done','In Progress','Blocked','Pending'];
const TASK_ITEM_CLS={Done:'stP','In Progress':'stL',Blocked:'stA',Pending:'stH'};
// Normalise a task_updates row into a list of task items (falls back to legacy single-field rows).
function taskItems(r){

}

const fmtMin=m=>{m=Math.round(+m||0);return m>=60?`${Math.floor(m/60)}h${m%60?(' '+(m%60)+'m'):''}`:`${m}m`;};
/* ============ TASK INTELLIGENCE (on-device kNN time model) ============
   Learns from historical task text + actual minutes, and predicts how long a
   similar task will take. Similarity = token overlap (Jaccard) with a boost for
   the same project/client; prediction = similarity-weighted average of actuals. */
const _STOP=new Set('the a an and or of to for in on at with is are was were be been do did done doing task tasks work working update updates fix fixed fixing add added adding create created make made new page app data code test tested using use used from into this that then also more some all get set'.split(' '));
function tok(s){return [...new Set(String(s||'').toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>2&&!_STOP.has(w)))];}
function jac(a,b){if(!a.length||!b.length)return 0;const B=new Set(b);let inter=0;a.forEach(w=>{if(B.has(w))inter++;});return inter/(a.length+b.length-inter);}
let TASK_SAMPLES=[],PROJ_CLIENT={};
// Build the training set from task_updates (RLS: employees get their own, admins their org).
async function loadTaskSamples(){
  const [{data:rows},{data:pjs},{data:cls}]=await Promise.all([
    sb.from('task_updates').select('employee_id,upd_date,project,tasks').not('tasks','is',null).order('upd_date',{ascending:false}).limit(3000),
    sb.from('projects').select('name,client_id'),
    sb.from('clients').select('id,name')]);
  const clientName={};(cls||[]).forEach(c=>clientName[c.id]=c.name);
  PROJ_CLIENT={};(pjs||[]).forEach(p=>{PROJ_CLIENT[p.name]=p.client_id?(clientName[p.client_id]||''):'Internal';});
  const out=[];
  (rows||[]).forEach(r=>{const proj=(r.project||'').split(',')[0].trim();const client=PROJ_CLIENT[proj]||'';
    (Array.isArray(r.tasks)?r.tasks:[]).forEach(t=>{if(!t.task)return;
      out.push({tokens:tok(t.task),text:t.task,project:proj,client,act:+t.act_min||0,est:+t.est_min||0,emp:r.employee_id,date:r.upd_date,status:t.status});});});
  TASK_SAMPLES=out;return out;
}
// Predict minutes for a task, using only samples that have a recorded actual time.
function predictTime(text,project,client){
  const q=tok(text);if(!q.length)return null;
  const trained=TASK_SAMPLES.filter(s=>s.act>0);

  const clientName={};(cls||[]).forEach(c=>clientName[c.id]=c.name);
  const projMeta={};(pjs||[]).forEach(p=>projMeta[p.name]={client:p.client_id?(clientName[p.client_id]||'Internal'):'Internal',status:p.status});
  const P={};

// Predict and show an estimate for this task row from the model.
function suggestTime(inp){
  const row=inp.closest('.taskrow');const el=row.querySelector('.tk-suggest');const text=inp.value.trim();
  if(!text){if(el)el.textContent='';return;}
  const proj=row.querySelector('.tk-project')?.value||'';const client=PROJ_CLIENT[proj]||'';
  const p=predictTime(text,proj,client);
  if(!p||!el){if(el)el.textContent='';return;}
  el.innerHTML=`<i class="fa-solid fa-wand-magic-sparkles"></i> Model suggests ~<b>${fmtMin(p.mins)}</b> (from ${p.n} ${p.how}).`;
  const eh=row.querySelector('.tk-est-h'),em=row.querySelector('.tk-est-m');
  if(eh&&em&&!eh.value&&!em.value){const hm=minToHM(p.mins);eh.value=hm.h||'';em.value=hm.m||'';}
}
// Re-populate a task row's Project dropdown to only the projects for the newly picked client.
function onTaskClientChange(clientSel){
  const row=clientSel.closest('.taskrow');const projSel=row.querySelector('.tk-project');
  const cur=projSel.value;const list=PROJECTS_BY_CLIENT[clientSel.value]||[];

    `<option value="${esc(n)}" ${n===cur?'selected':''}>${esc(n)}</option>`).join('');

// Live "n / 1000" character counter under each task textarea.

function toggleTaskRow(btn){const body=btn.closest('.taskrow').querySelector('.tk-body');const open=body.style.display!=='none';

function renumberTasks(){document.querySelectorAll('#tasklist .taskrow .tasknum').forEach((el,i)=>el.textContent='Task '+(i+1));}
function collectTasks(){return [...document.querySelectorAll('#tasklist .taskrow')].map(row=>({

async function saveTask(eid,d){
  const tasks=collectTasks();
  // Estimated and Actual time are mandatory on every task row.
  const bad=tasks.findIndex(t=>!t.est_min||!t.act_min);
  if(bad>-1)return alert(`Task ${bad+1}: Estimated time and Actual time are required (enter a value above 0).`);
  const projUnion=[...new Set(tasks.map(t=>t.project).filter(Boolean))].join(', ');
  const o={employee_id:eid,upd_date:d,
    update_status:$('t_update_status').value||null,
    project:projUnion||null,

    // Legacy mirror so older readers / exports still show content.
    task_assigned:tasks.map((t,i)=>`${i+1}. ${t.task}${t.status?' ('+t.status+')':''}`).join('\n')||null,
    completed:tasks.filter(t=>t.completed).map(t=>t.completed).join('; ')||null,

    next_task:tasks.filter(t=>t.next).map(t=>t.next).join('; ')||null,
    not_working:null};
  const{error}=await sb.from('task_updates').upsert(o,{onConflict:'employee_id,upd_date'});
  if(error)return alert(error.message);document.querySelector('.modal').remove();
  ME.profile.role==='admin'?task(d):myupd();
}

/* ---------- PERFORMANCE ---------- */
async function perf(ym){
  const now=new Date();ym=ym||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [y,m]=ym.split('-').map(Number);const dim=new Date(y,m,0).getDate();
  const [{data:emps},{data:rows},{data:hols}]=await Promise.all([
    sb.from('employees').select('*').eq('status','Active').order('emp_code'),
    sb.from('task_updates').select('employee_id,update_status').gte('upd_date',`${ym}-01`).lte('upd_date',`${ym}-${dim}`),
    sb.from('holidays').select('holiday_date').gte('holiday_date',`${ym}-01`).lte('holiday_date',`${ym}-${dim}`)]);
  const H=new Set((hols||[]).map(h=>h.holiday_date));
  let wdays=0;for(let d=1;d<=dim;d++){const w=new Date(y,m-1,d).getDay();if(w!==0&&w!==6&&!H.has(`${ym}-${String(d).padStart(2,'0')}`))wdays++}
  const agg={};(rows||[]).forEach(r=>{const a=agg[r.employee_id]=agg[r.employee_id]||{shared:0,wfh:0,leave:0};
    if(r.update_status==='Update Shared')a.shared++;else if(r.update_status==='WFH')a.wfh++;
    else if(['Leave','Sick Leave'].includes(r.update_status))a.leave++;});
  const tots=(emps||[]).reduce((a,e)=>{const x=agg[e.id]||{shared:0,wfh:0,leave:0};a.sh+=x.shared;a.wf+=x.wfh;a.lv+=x.leave;a.ms+=Math.max(0,wdays-x.shared-x.wfh-x.leave);return a},{sh:0,wf:0,lv:0,ms:0});
  const avgr=(emps||[]).length&&wdays?Math.round(tots.sh/((emps||[]).length*wdays)*100):0;
  M(pgh(`Performance Summary — ${MONTHS[m-1]} ${y}`,'Overview of team performance and productivity for the selected month.','<button class="btn" onclick="print()"><i class="fa-solid fa-print"></i> Export</button>')+
  `<div class="row noprint" style="margin-bottom:14px"><div style="max-width:180px"><label>Month</label><input type="month" value="${ym}" onchange="perf(this.value)"></div>
  <div style="padding-top:20px"><span class="badge stL">Working days: ${wdays}</span></div></div>`+
  kpis([['<i class="fa-solid fa-users"></i>','#E8EEFB','Total Employees',(emps||[]).length],['<i class="fa-solid fa-share-from-square"></i>','#E6F7EC','Updates Shared',tots.sh],['<i class="fa-solid fa-house"></i>','#FFE9DC','WFH',tots.wf],['<i class="fa-solid fa-umbrella-beach"></i>','#F3ECFB','Leave',tots.lv],['<i class="fa-solid fa-clock" style="color:#D35400"></i>','#FDEBD0','Missed Updates',tots.ms],['<i class="fa-solid fa-arrow-trend-up"></i>','#E8F8F5','Average Update Rate',avgr+'%']])+`
  <div class="card"><table><tr><th>ID</th><th>Name</th><th>Designation</th><th>Updates Shared</th><th>WFH</th><th>Leave</th><th>Missed</th><th>Update Rate</th><th>Rating</th></tr>
  ${(emps||[]).map(e=>{const a=agg[e.id]||{shared:0,wfh:0,leave:0};
    const rate=wdays?Math.round((a.shared+a.wfh)/wdays*100):0;
    const rating=rate>=90?'<i class="fa-solid fa-star" style="color:#E8A200"></i> Excellent':rate>=75?'<i class="fa-solid fa-circle-check" style="color:#1E8449"></i> Good':rate>=50?'<i class="fa-solid fa-triangle-exclamation" style="color:#E8682A"></i> Average':'<i class="fa-solid fa-circle-xmark" style="color:#C0392B"></i> Poor';
    return`<tr><td>${e.emp_code}</td><td style="white-space:nowrap">${av(e.full_name)}<b>${esc(e.full_name)}</b></td><td>${esc(e.designation)}</td>
    <td>${a.shared}</td><td>${a.wfh}</td><td>${a.leave}</td><td>${Math.max(0,wdays-a.shared-a.wfh-a.leave)}</td>
    <td style="font-weight:700;color:${rate>=75?'var(--green)':rate>=50?'#D35400':'var(--red)'}">${rate}%</td><td>${rating}</td></tr>`}).join('')}</table></div>
  <button class="btn noprint" onclick="print()"><i class="fa-solid fa-print"></i> Print / PDF</button>`);
}

/* ---------- WFH & LEAVE ---------- */
async function wfh(){
  const{data}=await sb.from('wfh_leave').select('*,employees(full_name,emp_code)').order('req_date',{ascending:false}).limit(200);
  M(pgh('WFH & Leave Log','View and manage work from home and leave requests')+
  `<div class="warnbar"><i class="fa-solid fa-triangle-exclamation" style="color:#E8682A"></i> Only management-approved WFH/Leave is valid. Late intimation is NOT accepted (due before 8:00 AM).</div>
  <div class="card"><table><tr><th>Dates</th><th>Days</th><th>Employee</th><th>Type</th><th>Reason</th><th>Approved</th><th></th></tr>
  ${(data||[]).map(r=>{const e=r.end_date||r.req_date;const days=Math.round((new Date(e)-new Date(r.req_date))/864e5)+1;
  return `<tr><td style="white-space:nowrap">${e!==r.req_date?`${fmtDate(r.req_date)} → ${fmtDate(e)}`:fmtDate(r.req_date)}</td><td>${days}</td><td>${esc(r.employees?.full_name)} (${r.employees?.emp_code})</td>
  <td>${r.status}</td><td>${esc(r.reason)}</td>
  <td><span class="badge ${r.approved==='Yes'?'stP':r.approved==='No'?'stA':'stL'}">${r.approved}</span></td>
  <td class="noprint">${r.approved==='Pending'?`<button class="btn sm" onclick="apprWfh('${r.id}','Yes')">Approve</button>
  <button class="btn sm warn" onclick="apprWfh('${r.id}','No')">Reject</button>`:''}</td></tr>`}).join('')}</table></div>`);
}
// Approved WFH/Leave → attendance code. WFH→W, Half Day→H, all leave kinds→OL (Paid Leave).
const LEAVE_TO_ATT={'WFH':'W','Half Day':'H','Leave':'OL','Sick Leave':'OL','Emergency Leave':'OL'};
// Inclusive list of YYYY-MM-DD dates from a to b (b defaults to a).
function leaveDates(a,b){const out=[];const d=new Date(a+'T00:00:00'),end=new Date((b||a)+'T00:00:00');
  while(d<=end){out.push(isoD(d));d.setDate(d.getDate()+1);}return out;}
async function apprWfh(id,v){
  const{error}=await sb.from('wfh_leave').update({approved:v}).eq('id',id);
  if(error)return alert(error.message);
  // On approval, auto-stamp the attendance log for every day in the request so the
  // employee's status reflects the grant. Employees can't self-mark Present on these
  // days; only an admin can override to P from Daily Attendance.
  if(v==='Yes'){
    const{data:req}=await sb.from('wfh_leave').select('*').eq('id',id).single();
    if(req){const code=LEAVE_TO_ATT[req.status]||'OL';
      const ups=leaveDates(req.req_date,req.end_date).map(dt=>({employee_id:req.employee_id,att_date:dt,status:code,remarks:req.status+' (approved)'}));
      const{error:e2}=await sb.from('attendance').upsert(ups,{onConflict:'employee_id,att_date'});
      if(e2)alert('Approved, but attendance auto-update failed: '+e2.message);}
  }
  wfh();
}

/* ---------- PAYROLL ---------- */
function autoPay(e,y,m,att){const dim=new Date(y,m,0).getDate();
  const unpaid=(att&&att.unpaid)||0;const td=dim;const paid=dim-unpaid;
  const ctc=e.eff_ctc!=null?e.eff_ctc:e.ctc;
  if(!ctc)return{total_days:td,paid_days:paid};
  const g=+ctc,f=td?paid/td:1;
  return{total_days:td,paid_days:paid,basic:Math.round(g*0.5),hra:Math.round(g*0.2),other_allowance:Math.round(g*0.3),pt:g>20000?200:(g>15000?150:0),lop:Math.round(g*(1-f)),incentives:'',arrears:''};}
async function pay(ym){
  const now=new Date();ym=ym||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [y,m]=ym.split('-').map(Number);
  const dim0=new Date(y,m,0).getDate();
  const [{data:emps},{data:rows},{data:arec},{data:hist}]=await Promise.all([
    sb.from('employees').select('*').eq('status','Active').order('emp_code'),
    sb.from('payroll').select('*').eq('pay_year',y).eq('pay_month',m),
    sb.from('attendance').select('employee_id,status').gte('att_date',`${ym}-01`).lte('att_date',`${ym}-${dim0}`),
    sb.from('salary_history').select('employee_id,effective_month,previous_ctc,new_ctc')]);
  const map={};(rows||[]).forEach(r=>map[r.employee_id]=r);
  // Effective CTC per employee for THIS month, plus a flag if a hike took effect this month.
  const HIST={};(hist||[]).forEach(h=>{(HIST[h.employee_id]=HIST[h.employee_id]||[]).push(h);});
  (emps||[]).forEach(e=>{e.eff_ctc=effectiveCtc(HIST[e.id],ym,e.ctc);
    e.hiked_this_month=(HIST[e.id]||[]).find(h=>h.effective_month>=`${ym}-01`&&h.effective_month<=`${ym}-31`);});
  const ATT={};(arec||[]).forEach(r=>{const a=ATT[r.employee_id]=ATT[r.employee_id]||{unpaid:0};
    if(r.status==='A'||r.status==='UL')a.unpaid++;else if(r.status==='H')a.unpaid+=0.5;});

  `<div class="row noprint" style="margin-bottom:14px"><div style="max-width:180px"><label>Month</label><input type="month" value="${ym}" onchange="pay(this.value)"></div></div>`+
  kpis([['<i class="fa-solid fa-money-bills"></i>','#E8EEFB','Total Gross Pay','—','', 'kgross'],['<i class="fa-solid fa-file-invoice"></i>','#E6F7EC','Total Deductions','—','','kded'],['<i class="fa-solid fa-money-bill-wave"></i>','#FFE9DC','Net Pay (Take Home)','—','','knet'],['<i class="fa-solid fa-users"></i>','#F3ECFB','Employees',(emps||[]).length,'','kemp']])+`
  <div class="card" style="overflow:auto"><table id="ptbl"><tr><th>ID</th><th>Name</th><th>Days</th><th>Paid</th><th>Basic</th><th>HRA</th><th>Other Allow</th><th>Incentives</th><th>Arrears</th><th>PT</th><th>LOP</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Salary Status</th><th>Payslip</th><th></th></tr>
  ${(emps||[]).map(e=>{const ctcEff=e.eff_ctc!=null?e.eff_ctc:e.ctc;let r=map[e.id];let refreshed=false;

      const td=+r.total_days||new Date(y,m,0).getDate();const pd=+r.paid_days||td;const f=td?pd/td:1;
      r={...r,basic:Math.round(ctcEff*0.5),hra:Math.round(ctcEff*0.2),other_allowance:Math.round(ctcEff*0.3),pt:ctcEff>20000?200:(ctcEff>15000?150:0),lop:Math.round(ctcEff*(1-f))};refreshed=true;}

  <td class="noprint"><button class="btn sm sec" onclick="slip('${e.id}',${y},${m})">Payslip</button></td></tr>`}).join('')}</table></div>`);
  const upd=()=>{document.querySelectorAll('#ptbl tr[data-eid]').forEach(tr=>{

      if(ctc&&td)tr.querySelector('[data-k=lop]').value=Math.max(0,Math.round(ctc*(td-pd)/td));}
    upd();}));upd();
}
// Refill formula-based components from each row's current (effective) CTC. Skips Paid rows,
// keeps incentives/arrears. Admin reviews then clicks Save All.
function recomputePay(){let n=0;
  document.querySelectorAll('#ptbl tr[data-eid]').forEach(tr=>{
    if(tr.querySelector('[data-k=pay_status]').value==='Paid')return;
    const ctc=+tr.dataset.ctc||0;if(!ctc)return;
    const td=+tr.querySelector('[data-k=total_days]').value||0,pd=+tr.querySelector('[data-k=paid_days]').value||0;const f=td?pd/td:1;
    const set=(k,v)=>tr.querySelector(`[data-k=${k}]`).value=v;
    set('basic',Math.round(ctc*0.5));set('hra',Math.round(ctc*0.2));set('other_allowance',Math.round(ctc*0.3));
    set('pt',ctc>20000?200:(ctc>15000?150:0));set('lop',Math.round(ctc*(1-f)));
    tr.querySelector('[data-k=basic]').dispatchEvent(new Event('input',{bubbles:true}));n++;});
  alert(n?`Recomputed ${n} row(s) from current CTC. Review and click Save All.`:'Nothing to recompute — Paid rows are locked and untouched.');
}
async function savePay(y,m){
  const ups=[];document.querySelectorAll('#ptbl tr[data-eid]').forEach(tr=>{
    const g=k=>+tr.querySelector(`[data-k=${k}]`).value||0;
    const basic=g('basic');if(!basic&&!g('paid_days'))return;
    const gross=basic+g('hra')+g('other_allowance');const add=gross+g('incentives')+g('arrears');const ded=g('pt')+g('lop');
    ups.push({employee_id:tr.dataset.eid,pay_year:y,pay_month:m,total_days:g('total_days'),paid_days:g('paid_days'),
      basic,hra:g('hra'),other_allowance:g('other_allowance'),gross,incentives:g('incentives'),arrears:g('arrears'),
      gross_additions:add,pt:g('pt'),lop:g('lop'),total_deductions:ded,net:add-ded,
      pay_status:tr.querySelector('[data-k=pay_status]').value})});
  if(!ups.length)return alert('Nothing to save');
  const{error}=await sb.from('payroll').upsert(ups,{onConflict:'employee_id,pay_year,pay_month'});
  alert(error?error.message:'Saved ✔');
}

let FLASH=null;// {msg,ok} shown once after a mydash() re-render
// Best-effort location: never rejects. Tries high accuracy, then falls back to a
// low-accuracy/cached fix so a slow or blocked GPS can't stop the employee checking in.
function getPos(){return new Promise(res=>{
  if(!navigator.geolocation||!window.isSecureContext)
    return res({coords:null,err:window.isSecureContext?'Location is not supported on this device/browser.':'Open the secure https app link (not a local file) to record location.'});
  const done=p=>res({coords:p.coords,err:null});
  navigator.geolocation.getCurrentPosition(done,
    ()=>navigator.geolocation.getCurrentPosition(done,
      e=>res({coords:null,err:e.message+' — allow location access for this site in your browser settings.'}),
      {enableHighAccuracy:false,timeout:15000,maximumAge:60000}),
    {enableHighAccuracy:true,timeout:12000});
})}
function _fetchT(url,ms){return Promise.race([fetch(url,{headers:{'Accept':'application/json'}}),new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),ms))]);}
// Reverse-geocode to a readable place name. BigDataCloud is CORS-friendly and keyless
// (Nominatim often blocks browser calls); we fall back to it, then to raw coordinates.
async function geoName(lat,lng){
  try{
    const r=await _fetchT(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`,7000);
    const j=await r.json();
    const parts=[j.locality||j.city,j.principalSubdivision,j.countryName].filter(Boolean);
    if(parts.length)return parts.slice(0,2).join(', ');
  }catch(e){}
  try{
    const r=await _fetchT(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16`,7000);
    const j=await r.json();const a=j.address||{};
    const n=[a.suburb||a.neighbourhood||a.village,a.city||a.town||a.county,a.state].filter(Boolean).slice(0,2).join(', ')||(j.display_name?j.display_name.split(',').slice(0,2).join(', '):'');
    if(n)return n;
  }catch(e){}
  // Last resort: store the coordinates so the check-in always has a location value.
  return `${(+lat).toFixed(5)}, ${(+lng).toFixed(5)}`;
}
async function checkIn(ev){
  const btn=ev&&ev.target?ev.target.closest('button'):null;
  if(btn){btn.disabled=true;btn.style.opacity=.6;}
  const g=$('geoerr');if(g){g.style.color='#6b7a90';g.textContent='Getting your location…';}
  try{
    // Block self check-in when an approved WFH/Leave covers today — only admin can mark Present.
    const dt=today();
    const{data:lv}=await sb.from('wfh_leave').select('status,req_date,end_date').eq('employee_id',ME.employee.id).eq('approved','Yes').lte('req_date',dt);
    const lt=(lv||[]).find(r=>(r.end_date||r.req_date)>=dt);
    if(lt){if(g){g.style.color='var(--red)';g.textContent=`You have approved ${lt.status} for today — only your admin can mark you present.`;}if(btn){btn.disabled=false;btn.style.opacity=1;}return;}
    const {coords,err}=await getPos();
    const loc=coords?await geoName(coords.latitude,coords.longitude):'';
    const t=new Date().toTimeString().slice(0,5);
    const{error}=await sb.from('attendance').upsert({employee_id:ME.employee.id,att_date:today(),entry_time:t,status:'P',
      in_lat:coords?coords.latitude:null,in_lng:coords?coords.longitude:null,in_loc:loc||null},{onConflict:'employee_id,att_date'});
    if(error)throw error;
    FLASH=coords?{msg:'Checked in'+(loc?' — '+loc:'')+'.',ok:true}:{msg:'Checked in, but location was unavailable ('+err+')',ok:false};
    mydash();
  }catch(e){if(g){g.style.color='var(--red)';g.textContent='Check-in failed: '+e.message;}if(btn){btn.disabled=false;btn.style.opacity=1;}}
}
async function checkOut(ev){
  const btn=ev&&ev.target?ev.target.closest('button'):null;
  if(btn){btn.disabled=true;btn.style.opacity=.6;}
  const g=$('geoerr');if(g){g.style.color='#6b7a90';g.textContent='Getting your location…';}
  try{
    const {coords,err}=await getPos();
    const loc=coords?await geoName(coords.latitude,coords.longitude):'';
    const t=new Date().toTimeString().slice(0,5);

  }catch(e){if(g){g.style.color='var(--red)';g.textContent='Check-out failed: '+e.message;}if(btn){btn.disabled=false;btn.style.opacity=1;}}
}
let MY_TASK={period:'monthly',date:today(),search:'',page:0,pageSize:10,_focus:false};

async function myupd(dstr){
  if(!ME.employee)return mydash();
  if(typeof dstr==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(dstr)){MY_TASK.date=dstr;MY_TASK.page=0;}
  const st=MY_TASK,a=st.date||today(),d=today();
  let from,to;
  if(st.period==='weekly'){const dt=new Date(a+'T00:00:00');const mon=new Date(dt);mon.setDate(dt.getDate()-((dt.getDay()+6)%7));const sun=new Date(mon);sun.setDate(mon.getDate()+6);from=isoD(mon);to=isoD(sun);}
  else if(st.period==='monthly'){const [y,m]=a.split('-').map(Number);from=`${a.slice(0,7)}-01`;to=`${a.slice(0,7)}-${String(new Date(y,m,0).getDate()).padStart(2,'0')}`;}
  else{from=to=a;}
  const [{data},{data:cls},{data:pjs},{data:todayRows}]=await Promise.all([
    sb.from('task_updates').select('*').eq('employee_id',ME.employee.id).gte('upd_date',from).lte('upd_date',to).order('upd_date',{ascending:false}).order('created_at',{ascending:false}),
    sb.from('clients').select('id,name'),
    sb.from('projects').select('name,client_id'),
    // Today's row fetched independently of the viewed period, so the header CTA always
    // reflects today's true state (Edit + prefilled) even while browsing past days.
    sb.from('task_updates').select('*').eq('employee_id',ME.employee.id).eq('upd_date',d).limit(1)]);
  const clientOfProject={};(pjs||[]).forEach(p=>{clientOfProject[p.name]=p.client_id||''});
  const clientNameById={};(cls||[]).forEach(c=>clientNameById[c.id]=c.name);
  const t=(data||[]).find(r=>r.upd_date===d)||(todayRows&&todayRows[0])||null;
  const list=(data||[]);
  const cnt={nu:list.filter(r=>r.update_status==='No Update').length,sh:list.filter(r=>r.update_status==='Update Shared').length};
  const pct=(cnt.sh+cnt.nu)?Math.round(cnt.sh/(cnt.sh+cnt.nu)*100):0;
  let display=list;

  ${rows.map(r=>`<tr><td style="white-space:nowrap">${fmtDate(r.created_at.slice(0,10))}</td><td><b>${esc(r.company_name)}</b></td>
  <td>${esc(r.contact_name)}</td><td>${esc(r.email)}</td><td>${esc(r.phone||'—')}</td>
  <td style="max-width:240px;font-size:12px">${esc(r.message||'—')}${r.review_notes?`<br><span style="color:#889">Note: ${esc(r.review_notes)}</span>`:''}</td>
  <td><span class="badge ${badge(r.status)}">${esc(r.status)}</span></td>
  <td class="noprint" style="white-space:nowrap">${r.status==='Pending'?`<button class="btn sm" style="background:#1E8449" onclick="approveSignup('${r.id}','${esc(r.email)}','${esc(r.company_name)}')">Approve</button> <button class="btn sm warn" onclick="rejectSignup('${r.id}')">Reject</button>`:'—'}</td></tr>`).join('')||'<tr><td colspan="8" style="color:#889">No signup requests yet.</td></tr>'}</table></div>`);
}
async function approveSignup(id,email,company){
  const pw=prompt(`Approve "${company}" (${email}).\n\nSet an admin password for this account (min 6 characters):`);
  if(pw===null)return;
  if(pw.length<6)return alert('Password must be at least 6 characters.');
  const{data,error}=await sb.functions.invoke('review-signup',{body:{request_id:id,action:'approve',password:pw}});
  if(error||data?.error)return alert('Approve failed: '+(data?.error||error.message));
  alert(`✔ Approved.\n\nShare these credentials with ${company}:\n\nEmail: ${email}\nPassword: ${pw}`);
  signups();
}
async function rejectSignup(id){
  const notes=prompt('Reject this request?\n\nOptional reason (shown in the log):');
  if(notes===null)return;
  const{data,error}=await sb.functions.invoke('review-signup',{body:{request_id:id,action:'reject',notes:notes||null}});
  if(error||data?.error)return alert('Reject failed: '+(data?.error||error.message));
  signups();
}
async function fb(){
  const{data,error}=await sb.from('feedback').select('*,employees(full_name,emp_code),orgs(name)').order('created_at',{ascending:false});
  if(error)return M(`<h2>Feedback</h2><div class="warnbar">${esc(error.message)}</div>`);
  const rows=data||[];const open=rows.filter(r=>r.status!=='Done').length;
  M(pgh('Product Feedback','Feedback &amp; requirements from all Merik tenants.')+
  kpis([['<i class="fa-solid fa-comment-dots"></i>','#E8EEFB','Total',rows.length],['<i class="fa-solid fa-inbox"></i>','#FFE9DC','Open',open],['<i class="fa-solid fa-circle-check"></i>','#E6F7EC','Done',rows.length-open]])+
  `<div class="card"><table><tr><th>Date</th><th>Tenant</th><th>Employee</th><th>Category</th><th>Feedback</th><th>Status</th><th>Reply</th></tr>
  ${rows.map(r=>`<tr data-fid="${r.id}"><td style="white-space:nowrap">${fmtDate(r.created_at.slice(0,10))}</td>
  <td style="white-space:nowrap">${esc(r.orgs?.name||'—')}</td>
  <td style="white-space:nowrap">${esc(r.employees?.full_name||'—')}</td><td>${esc(r.category)}</td>
  <td style="max-width:320px">${esc(r.message)}</td>
  <td><select onchange="setFbStatus('${r.id}',this.value)" style="width:120px">${FB_STATUS.map(s=>`<option ${r.status===s?'selected':''}>${s}</option>`).join('')}</select></td>
  <td style="min-width:200px"><textarea rows="2" style="width:100%;font-size:12px" placeholder="Reply to employee…" onblur="setFbReply('${r.id}',this.value)">${esc(r.admin_reply||'')}</textarea></td></tr>`).join('')||'<tr><td colspan="7" style="color:#889">No feedback yet.</td></tr>'}</table></div>`);
}
async function setFbStatus(id,v){const{error}=await sb.from('feedback').update({status:v,updated_at:new Date().toISOString()}).eq('id',id);if(error)alert(error.message)}
async function setFbReply(id,v){const{error}=await sb.from('feedback').update({admin_reply:v||null,updated_at:new Date().toISOString()}).eq('id',id);if(error)alert(error.message)}
async function myslip(){
  if(!ME.employee)return mydash();
  // Only full-time employees receive payslips.
  if(ME.employee.employment_type!=='Full-time'){
    return M(`<h2>My Payslips</h2><div class="warnbar"><i class="fa-solid fa-circle-info" style="color:#2563A8"></i> Payslips are available for full-time employees only. Please contact your admin if you believe this is incorrect.</div>`);
  }
  // RLS returns only payslips the admin has released (sent).
  const{data}=await sb.from('payroll').select('*').eq('employee_id',ME.employee.id).order('pay_year',{ascending:false}).order('pay_month',{ascending:false});
  M(`<h2>My Payslips</h2><div class="warnbar"><i class="fa-solid fa-circle-info" style="color:#2563A8"></i> Payslips appear here once released by your admin.</div>
  <div class="card"><table><tr><th>Month</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Status</th><th></th></tr>
  ${(data||[]).map(r=>`<tr><td>${MONTHS[r.pay_month-1]} ${r.pay_year}</td><td>${inr(r.gross)}</td><td>${inr(r.total_deductions)}</td><td><b>${inr(r.net)}</b></td>
  <td><span class="badge ${r.pay_status==='Paid'?'stP':'stA'}">${r.pay_status||'Unpaid'}</span></td>
  <td><button class="btn sm" onclick="slip('${r.employee_id}',${r.pay_year},${r.pay_month})"><i class="fa-solid fa-download"></i> Download</button></td></tr>`).join('')||'<tr><td colspan="6" style="color:#889">No payslips released yet.</td></tr>'}</table></div>`);
}
boot();
</script>
