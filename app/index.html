<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Merik</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --navy:#1B3A6B;--deep:#14284B;--mid:#2563A8;--lblue:#D6E4F7;--orange:#E8682A;
  --bg:#F5F7FB;--card:#ffffff;--line:#E7ECF4;--ink:#1E2A3F;--muted:#6B7A90;
  --green:#1E8449;--red:#C0392B;--radius:14px;
  --shadow:0 1px 2px rgba(20,40,75,.04),0 6px 20px rgba(20,40,75,.06);
  --shadow-lg:0 18px 50px rgba(20,40,75,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-size:14px;font-family:'Inter',-apple-system,'Segoe UI',Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
button{cursor:pointer;font-family:inherit}

/* ---- Buttons ---- */
.btn{background:var(--deep);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:transform .12s ease,box-shadow .12s ease,background .12s ease;box-shadow:0 2px 6px rgba(20,40,75,.18)}
.btn:hover{background:#0f1f3c;transform:translateY(-1px);box-shadow:0 6px 16px rgba(20,40,75,.26)}
.btn:active{transform:translateY(0)}
.btn.sec{background:#EEF2F9;color:var(--navy);box-shadow:none;border:1px solid var(--line)}
.btn.sec:hover{background:#e4ebf6;color:var(--navy)}
.btn.warn{background:var(--orange);box-shadow:0 2px 8px rgba(232,104,42,.3)}
.btn.warn:hover{background:#d75b20}
.btn.sm{padding:5px 11px;font-size:12px;border-radius:8px}

/* ---- Forms ---- */
input,select,textarea{padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;width:100%;font-family:inherit;color:var(--ink);background:#fff;transition:border-color .12s ease,box-shadow .12s ease}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--mid);box-shadow:0 0 0 3px rgba(37,99,168,.14)}
input::placeholder,textarea::placeholder{color:#9aa8bf}
label{font-size:11.5px;font-weight:600;color:var(--muted);display:block;margin:10px 0 4px;letter-spacing:.2px}

/* ---- Tables ---- */
table{border-collapse:separate;border-spacing:0;width:100%;background:#fff;border-radius:12px;overflow:hidden}
th{background:#F1F5FC;color:var(--navy);padding:11px 10px;font-size:11.5px;font-weight:700;text-align:left;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;border-bottom:2px solid #E1E9F5;z-index:1}
table tr th:first-child{border-top-left-radius:12px}table tr th:last-child{border-top-right-radius:12px}
td{padding:10px;border-bottom:1px solid #EEF2F8;font-size:13px;color:var(--ink)}
tbody tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#FAFBFE}
tbody tr:hover td{background:#F1F6FD}

/* ---- Cards ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:18px}
.pghead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.pghead h2{margin-bottom:3px;font-size:23px;letter-spacing:-.4px}
.sub{color:var(--muted);font-size:13.5px}
.kicon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:var(--shadow);color:#14284B}
.kicon i{font-size:22px}
#side a .ic i{font-size:15px}
.btn i{font-size:12.5px}
.av2{display:inline-flex;width:30px;height:30px;border-radius:50%;align-items:center;justify-content:center;font-weight:700;font-size:11.5px;margin-right:8px;vertical-align:middle;color:#fff;background:var(--mid)}
.lgd{display:inline-flex;align-items:center;gap:6px;margin-right:14px;font-size:12.5px;color:#4a5a72}
.lgd b{display:inline-flex;width:22px;height:22px;border-radius:6px;align-items:center;justify-content:center;font-size:11px}
.pchip{display:inline-flex;align-items:center;gap:6px;background:var(--lblue);color:var(--navy);font-size:12px;font-weight:600;padding:5px 11px;border-radius:999px;margin:0 6px 6px 0}

/* ---- Layout ---- */
#app{display:flex;height:100vh;overflow:hidden}
#side{width:252px;background:linear-gradient(185deg,#0B1B36 0%,#0D2044 100%);color:#fff;flex-shrink:0;display:flex;flex-direction:column;height:100vh}
#side .navscroll{flex:1 1 auto;min-height:0;overflow-y:auto;padding-bottom:8px}
#side .navscroll::-webkit-scrollbar{width:8px}
#side .navscroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:8px}
#side .navscroll::-webkit-scrollbar-track{background:transparent}
#side .navscroll{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent}
#side .brand{display:flex;align-items:center;gap:12px;padding:22px 20px;font-size:20px;font-weight:800;letter-spacing:.4px;border-bottom:1px solid rgba(255,255,255,.09)}
#side .brand img{height:34px;border-radius:8px}
#side .grp{font-size:10.5px;font-weight:700;letter-spacing:1.6px;color:#6079A3;padding:16px 22px 6px;text-transform:uppercase}
#side a{display:flex;align-items:center;gap:12px;color:#C3D2EA;padding:10px 14px;margin:2px 12px;text-decoration:none;font-size:14px;font-weight:500;border-radius:10px;border-left:3px solid transparent;transition:background .12s ease,color .12s ease}
#side a .ic{width:22px;text-align:center;font-size:15px}
#side a:hover{background:rgba(255,255,255,.07);color:#fff}
#side a.act{background:linear-gradient(90deg,rgba(232,104,42,.22),rgba(29,63,122,.35));color:#fff;border-left:3px solid var(--orange);box-shadow:0 2px 10px rgba(0,0,0,.28);font-weight:600}
#side .sep{border-top:1px solid rgba(255,255,255,.08);margin:10px 18px}
#side a.sout{color:#FF6B7A;font-weight:700}
#side .ufoot{margin-top:auto;display:flex;align-items:center;gap:12px;padding:14px 20px;border-top:1px solid rgba(255,255,255,.09);background:rgba(0,0,0,.2)}
#side .ufoot .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#24406e,#2f5290);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff}
#side .ufoot .nm{font-size:12.5px;color:#EAF1FC;line-height:1.4;font-weight:600}
#side .ufoot .rl{font-size:11px;color:#8298BC;font-weight:400}
#main{flex:1;padding:26px 30px;overflow-y:auto;overflow-x:hidden;height:100vh}
h2{color:var(--navy);margin-bottom:12px;font-size:20px;letter-spacing:-.3px}
.btn[disabled]{opacity:.45;cursor:default;transform:none;box-shadow:none}
.pager{display:flex;align-items:center;justify-content:flex-end;gap:14px;flex-wrap:wrap;margin:-4px 0 18px}
.pager .pinfo{font-size:12.5px;color:var(--muted);font-weight:600}

/* ---- Rows / status ---- */
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:end}
.row>div{flex:1;min-width:130px}
.badge{padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:700;display:inline-block;line-height:1.6}
.stP{background:#D5F5E3;color:#1E8449}.stA{background:#FADBD8;color:#C0392B}.stL{background:#FDEBD0;color:#D35400}
.stH{background:#D6EAF8;color:#1F618D}.stW{background:#E8DAEF;color:#6C3483}.stOL{background:#FFF0E0;color:#B7600A}.stUL{background:#F2D7D5;color:#7B241C}

/* ---- Modal ---- */
.modal{position:fixed;inset:0;background:rgba(11,27,54,.5);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal .card{width:640px;max-width:95vw;max-height:90vh;overflow:auto;box-shadow:var(--shadow-lg);margin:0}

/* ---- Attendance grid ---- */
.grid-att td{text-align:center;padding:2px;min-width:26px;font-weight:700;font-size:11px}
.wke{background:#EEF0F5!important;color:#6B7FA3}
.hol{background:#FFE8E8!important;color:#8B0000}

/* ---- KPI ---- */
.kpi{display:flex;gap:14px;flex-wrap:wrap}
.kpi .card{flex:1;min-width:150px;text-align:center;margin:0;transition:transform .15s ease,box-shadow .15s ease}
.kpi .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.kpi .n{font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-.5px}

/* ---- Login ---- */
#login{max-width:380px;margin:90px auto;padding:32px;border-radius:18px;box-shadow:var(--shadow-lg);border-top:4px solid var(--orange)}
.warnbar{background:#FFF3E5;color:#A34A00;border-left:4px solid var(--orange);padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:13px}

/* ---- Print ---- */
@media print{#side,.noprint{display:none!important}#main{padding:0}body{background:#fff}#docsheet{outline:none!important}}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
.payslip{background:#fff;border:1px solid #90A4AE;max-width:800px;margin:auto;padding:0}
.payslip .hd{background:#1B3A6B;color:#fff;text-align:center;font-weight:800;padding:10px;font-size:18px}
.payslip table{width:100%;border-radius:0}.payslip td,.payslip th{border:1px solid #90A4AE;padding:6px 8px}
.payslip th{background:#1B3A6B;color:#fff;position:static;text-transform:none;letter-spacing:0}
</style>
</head>

const inr=n=>'₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2});
const today=()=>new Date().toISOString().slice(0,10);
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function words(n){n=Math.round(n);if(n===0)return'Zero';const a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];const b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
const two=x=>x<20?a[x]:b[Math.floor(x/10)]+(x%10?' '+a[x%10]:'');
const three=x=>x>99?a[Math.floor(x/100)]+' Hundred'+(x%100?' '+two(x%100):''):two(x);
let s='';if(n>=10000000){s+=three(Math.floor(n/10000000))+' Crore ';n%=10000000}
if(n>=100000){s+=three(Math.floor(n/100000))+' Lakh ';n%=100000}
if(n>=1000){s+=three(Math.floor(n/1000))+' Thousand ';n%=1000}
if(n)s+=three(n);return s.trim()}
const AVC=['#F26522','#2563A8','#16A085','#8E44AD','#C0392B','#D35400','#0E7C86','#27AE60'];
function av(n){n=(n||'?').trim()||'?';const pr=n.split(/\s+/);const ini=((pr[0][0]||'')+(pr[1]?.[0]||'')).toUpperCase();
  const c=AVC[(n.charCodeAt(0)+n.length)%AVC.length];
  return `<span class="av2" style="background:${c}22;color:${c}">${ini}</span>`}
function pgh(t,sub,action){return `<div class="pghead"><div><h2>${t}</h2><div class="sub">${sub}</div></div><div class="noprint">${action||''}</div></div>`}
function kpis(arr){return `<div class="kpi" style="margin-bottom:16px">${arr.map(([ic,bg,label,val,sub,vid])=>`<div class="card" style="display:flex;gap:14px;align-items:center;margin:0"><div class="kicon" style="background:${bg}">${ic}</div><div style="text-align:left"><div style="font-size:12.5px;color:#6b7a90">${label}</div><div ${vid?`id="${vid}"`:''} style="font-size:21px;font-weight:800;color:#14284B">${val}</div>${sub?`<div style="font-size:11.5px;color:#9aa8bc">${sub}</div>`:''}</div></div>`).join('')}</div>`}

async function boot(){

  if(!session){renderLogin();return}
  const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
  if(!prof||!prof.org_id){renderNoOrg(session.user);return}
  let emp=null,org=null;
  if(prof.employee_id){const{data}=await sb.from('employees').select('*').eq('id',prof.employee_id).single();emp=data}
  const{data:o}=await sb.from('orgs').select('*').eq('id',prof.org_id).single();org=o;
  ME={user:session.user,profile:prof,employee:emp,org:org||{name:'Workspace'}};
  renderShell();
}

const M=h=>{$('main').innerHTML=h;paginateTables()};
const PAGE_SIZE=10;
function paginateTables(){
  document.querySelectorAll('#main table').forEach(tb=>{
    if(tb.classList.contains('grid-att')||tb.id==='ditems')return;
    if(tb.closest('.payslip')||tb.closest('#docsheet')||tb.closest('.modal'))return;
    const rows=[...tb.rows].filter(r=>r.cells[0]&&r.cells[0].tagName==='TD');
    if(rows.length<=PAGE_SIZE)return;
    const pages=Math.ceil(rows.length/PAGE_SIZE);let page=0;
    const host=tb.closest('.card')||tb;
    const pager=document.createElement('div');pager.className='pager noprint';
    const draw=()=>{
      rows.forEach((r,i)=>{r.style.display=(i>=page*PAGE_SIZE&&i<(page+1)*PAGE_SIZE)?'':'none'});
      const from=page*PAGE_SIZE+1,to=Math.min((page+1)*PAGE_SIZE,rows.length);
      pager.innerHTML=`<span class="pinfo">Showing ${from}–${to} of ${rows.length}</span>`+
        `<button class="btn sm sec" data-a="prev"${page===0?' disabled':''}>‹ Prev</button>`+
        `<button class="btn sm sec" data-a="next"${page===pages-1?' disabled':''}>Next ›</button>`;
    };
    pager.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
      if(b.dataset.a==='prev'&&page>0)page--;else if(b.dataset.a==='next'&&page<pages-1)page++;draw();});
    host.after(pager);draw();
  });
}

async function mkLogin(eid,email){
  if(!email)return alert('Set an email for this employee first (Edit).');

async function saveAtt(d){
  const ups=[];document.querySelectorAll('#atbl tr[data-eid]').forEach(tr=>{
    const o={employee_id:tr.dataset.eid,att_date:d};let any=false;
    ['entry_time','exit_time','status','remarks'].forEach(k=>{const v=tr.querySelector(`[data-k=${k}]`).value;o[k]=v||null;if(v)any=true});
    if(any)ups.push(o)});
  if(!ups.length)return alert('Nothing to save');
  const{error}=await sb.from('attendance').upsert(ups,{onConflict:'employee_id,att_date'});
  alert(error?error.message:'Saved ✔');
}

async function mtr(ym){
  const now=new Date();ym=ym||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

/* ---------- PAYROLL ---------- */
function autoPay(e,y,m,att){const dim=new Date(y,m,0).getDate();
  const unpaid=(att&&att.unpaid)||0;const td=dim;const paid=dim-unpaid;
  if(!e.ctc)return{total_days:td,paid_days:paid};
  const g=+e.ctc,f=td?paid/td:1;
  return{total_days:td,paid_days:paid,basic:Math.round(g*0.5),hra:Math.round(g*0.2),other_allowance:Math.round(g*0.3),pt:g>20000?200:(g>15000?150:0),lop:Math.round(g*(1-f)),incentives:'',arrears:''};}
async function pay(ym){
  const now=new Date();ym=ym||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [y,m]=ym.split('-').map(Number);
  const dim0=new Date(y,m,0).getDate();
  const [{data:emps},{data:rows},{data:arec}]=await Promise.all([
    sb.from('employees').select('*').eq('status','Active').order('emp_code'),
    sb.from('payroll').select('*').eq('pay_year',y).eq('pay_month',m),
    sb.from('attendance').select('employee_id,status').gte('att_date',`${ym}-01`).lte('att_date',`${ym}-${dim0}`)]);
  const map={};(rows||[]).forEach(r=>map[r.employee_id]=r);
  const ATT={};(arec||[]).forEach(r=>{const a=ATT[r.employee_id]=ATT[r.employee_id]||{unpaid:0};
    if(r.status==='A'||r.status==='UL')a.unpaid++;else if(r.status==='H')a.unpaid+=0.5;});
  const F=['total_days','paid_days','basic','hra','other_allowance','incentives','arrears','pt','lop'];
  M(pgh(`Payroll — ${MONTHS[m-1]} ${y}`,'Manage employee payroll and salary details for the selected month.',`<button class="btn" onclick="savePay(${y},${m})"><i class="fa-solid fa-floppy-disk"></i> Save All</button>`)+
  `<div class="row noprint" style="margin-bottom:14px"><div style="max-width:180px"><label>Month</label><input type="month" value="${ym}" onchange="pay(this.value)"></div></div>`+
  kpis([['<i class="fa-solid fa-money-bills"></i>','#E8EEFB','Total Gross Pay','—','', 'kgross'],['<i class="fa-solid fa-file-invoice"></i>','#E6F7EC','Total Deductions','—','','kded'],['<i class="fa-solid fa-money-bill-wave"></i>','#FFE9DC','Net Pay (Take Home)','—','','knet'],['<i class="fa-solid fa-users"></i>','#F3ECFB','Employees',(emps||[]).length,'','kemp']])+`
  <div class="card" style="overflow:auto"><table id="ptbl"><tr><th>ID</th><th>Name</th><th>Days</th><th>Paid</th><th>Basic</th><th>HRA</th><th>Other Allow</th><th>Incentives</th><th>Arrears</th><th>PT</th><th>LOP</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Salary Status</th><th></th></tr>
  ${(emps||[]).map(e=>{const r=map[e.id]||autoPay(e,y,m,ATT[e.id]);return`<tr data-eid="${e.id}" data-ctc="${e.ctc||''}"><td>${e.emp_code}</td><td style="white-space:nowrap">${av(e.full_name)}<b>${esc(e.full_name)}</b>${!map[e.id]&&e.ctc?' <span title="auto-filled from CTC + attendance"><i class="fa-solid fa-bolt" style="color:#E8A200"></i></span>':''}</td>
  ${F.map(k=>`<td><input class="pi" data-k="${k}" type="number" step="0.01" value="${r[k]??''}" style="width:78px"></td>`).join('')}
  <td class="cg"></td><td class="cd"></td><td class="cn" style="font-weight:700"></td>
  <td><select class="pi" data-k="pay_status" style="width:95px;background:${r.pay_status==='Paid'?'#D5F5E3':'#FADBD8'}" onchange="this.style.background=this.value==='Paid'?'#D5F5E3':'#FADBD8'">
  <option ${r.pay_status==='Paid'?'selected':''}>Paid</option><option ${r.pay_status!=='Paid'?'selected':''}>Unpaid</option></select></td>
  <td class="noprint"><button class="btn sm sec" onclick="slip('${e.id}',${y},${m})">Payslip</button></td></tr>`}).join('')}</table></div>`);
  const upd=()=>{document.querySelectorAll('#ptbl tr[data-eid]').forEach(tr=>{
    const g=k=>+tr.querySelector(`[data-k=${k}]`).value||0;
    const gross=g('basic')+g('hra')+g('other_allowance');const add=gross+g('incentives')+g('arrears');
    const ded=g('pt')+g('lop');
    tr.querySelector('.cg').textContent=inr(gross);tr.querySelector('.cd').textContent=inr(ded);tr.querySelector('.cn').textContent=inr(add-ded);});
    let tg=0,td2=0,tn=0;document.querySelectorAll('#ptbl tr[data-eid]').forEach(tr=>{
      const g=k=>+tr.querySelector(`[data-k=${k}]`).value||0;
      const gr=g('basic')+g('hra')+g('other_allowance');tg+=gr;const dd=g('pt')+g('lop');td2+=dd;tn+=gr+g('incentives')+g('arrears')-dd});
    if($('kgross')){$('kgross').textContent=inr(tg);$('kded').textContent=inr(td2);$('knet').textContent=inr(tn)}};
  document.querySelectorAll('.pi').forEach(el=>el.addEventListener('input',function(){
    const k=this.dataset.k;
    if(k==='total_days'||k==='paid_days'){const tr=this.closest('tr');const ctc=+tr.dataset.ctc;
      const td=+tr.querySelector('[data-k=total_days]').value||0,pd=+tr.querySelector('[data-k=paid_days]').value||0;
      if(ctc&&td)tr.querySelector('[data-k=lop]').value=Math.max(0,Math.round(ctc*(td-pd)/td));}
    upd();}));upd();
}
async function savePay(y,m){
  const ups=[];document.querySelectorAll('#ptbl tr[data-eid]').forEach(tr=>{
    const g=k=>+tr.querySelector(`[data-k=${k}]`).value||0;
    const basic=g('basic');if(!basic&&!g('paid_days'))return;

  <div style="text-align:right;margin-top:34px;font-size:13px">For ${esc((ME.org?.name||"").toUpperCase())}<br><br><br><br>Authorized Signatory</div>

async function saveDocHtml(t,id){
  const{error}=await sb.from(t).update({custom_html:$('docsheet').innerHTML}).eq('id',id);
  alert(error?error.message:'Saved ✔ — this edited layout will be used every time you open this document.');
}
async function resetDocHtml(t,id){
  if(!confirm('Discard manual edits and go back to the auto-generated layout?'))return;
  await sb.from(t).update({custom_html:null}).eq('id',id);docPrint(t,id);
}

/* ---------- EMPLOYEE VIEWS ---------- */
async function mydash(){
  if(!ME.employee){M('<h2>Welcome</h2><div class="warnbar">Your account is not yet linked to an employee record. Ask your admin to add your email to the Employee List, then sign out and back in.</div>');return}
  const d=today();
  const [{data:t},{data:a}]=await Promise.all([
    sb.from('task_updates').select('id').eq('employee_id',ME.employee.id).eq('upd_date',d),
    sb.from('attendance').select('*').eq('employee_id',ME.employee.id).eq('att_date',d)]);
  const rec=(a||[])[0]||{};
  const locLink=(lat,lng,label)=>lat?`<a href="https://maps.google.com/?q=${lat},${lng}" target="_blank" style="font-size:12px"><i class="fa-solid fa-location-dot"></i> ${label}</a>`:'';
  M(pgh(`Hi, ${esc(ME.employee.full_name)}`,new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}))+
  `<div class="kpi" style="margin-bottom:16px">
  <div class="card" style="margin:0;text-align:center">
    <div style="font-size:13px;color:#6b7a90;margin-bottom:8px">Check In</div>
    <div style="font-size:24px;font-weight:800;color:#14284B">${rec.entry_time?rec.entry_time.slice(0,5):'—'}</div>
    ${locLink(rec.in_lat,rec.in_lng,esc(rec.in_loc||'Location'))}
    <div style="margin-top:10px">${rec.entry_time?'<span class="badge stP">Checked in <i class="fa-solid fa-check"></i></span>':`<button class="btn" style="background:#1E8449" onclick="checkIn()"><i class="fa-solid fa-arrow-right-to-bracket"></i> Check In</button>`}</div></div>
  <div class="card" style="margin:0;text-align:center">
    <div style="font-size:13px;color:#6b7a90;margin-bottom:8px">Check Out</div>
    <div style="font-size:24px;font-weight:800;color:#14284B">${rec.exit_time?rec.exit_time.slice(0,5):'—'}</div>
    ${locLink(rec.out_lat,rec.out_lng,esc(rec.out_loc||'Location'))}
    <div style="margin-top:10px">${rec.exit_time?'<span class="badge stA">Checked out <i class="fa-solid fa-check"></i></span>':(rec.entry_time?`<button class="btn" style="background:#C0392B" onclick="checkOut()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Check Out</button>`:'<span style="font-size:12px;color:#889">Check in first</span>')}</div></div>
  <div class="card" style="margin:0;text-align:center"><div style="font-size:13px;color:#6b7a90;margin-bottom:8px">Today's Update</div>
    <div style="font-size:24px">${t&&t.length?'<i class="fa-solid fa-circle-check" style="color:#1E8449"></i>':'<i class="fa-solid fa-circle-xmark" style="color:#C0392B"></i>'}</div>
    <div style="font-size:12px;color:#6b7a90">${t&&t.length?'Shared':'PENDING (due 5:30 PM)'}</div></div>
  <div class="card" style="margin:0;text-align:center"><div style="font-size:13px;color:#6b7a90;margin-bottom:8px">Status</div>
    <div style="font-size:24px;font-weight:800;color:#14284B">${rec.status||'—'}</div></div></div>
  <div class="warnbar">Daily update format: Task Assigned · Completed (with proof) · Not working · Exact blocker · Proof link · Next task. Missing update = no work done for the day.</div>
  <p id="geoerr" style="color:var(--red);font-size:13px"></p>`);
}
function getPos(){return new Promise((res,rej)=>{
  if(!navigator.geolocation)return rej(new Error('Geolocation not supported on this device/browser.'));
  navigator.geolocation.getCurrentPosition(p=>res(p.coords),e=>rej(new Error(e.message+' — allow location access and use the https app link (not a local file).')),{enableHighAccuracy:true,timeout:12000})})}
async function geoName(lat,lng){try{
  const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=16`,{headers:{'Accept':'application/json'}});
  const j=await r.json();const a=j.address||{};
  return [a.suburb||a.neighbourhood||a.village,a.city||a.town||a.county,a.state].filter(Boolean).slice(0,2).join(', ')||j.display_name?.split(',').slice(0,2).join(', ')||'';
}catch(e){return ''}}
async function checkIn(){
  try{
    const c=await getPos();const loc=await geoName(c.latitude,c.longitude);
    const t=new Date().toTimeString().slice(0,5);
    const{error}=await sb.from('attendance').upsert({employee_id:ME.employee.id,att_date:today(),entry_time:t,status:'P',
      in_lat:c.latitude,in_lng:c.longitude,in_loc:loc||null},{onConflict:'employee_id,att_date'});
    if(error)throw error;mydash();
  }catch(e){$('geoerr').textContent='Check-in failed: '+e.message}
}
async function checkOut(){
  try{
    const c=await getPos();const loc=await geoName(c.latitude,c.longitude);
    const t=new Date().toTimeString().slice(0,5);
    const{error}=await sb.from('attendance').update({exit_time:t,out_lat:c.latitude,out_lng:c.longitude,out_loc:loc||null})
      .eq('employee_id',ME.employee.id).eq('att_date',today());
    if(error)throw error;mydash();
  }catch(e){$('geoerr').textContent='Check-out failed: '+e.message}
}
async function myupd(){
  if(!ME.employee)return mydash();
  const d=today();
  const{data}=await sb.from('task_updates').select('*').eq('employee_id',ME.employee.id).order('upd_date',{ascending:false}).limit(15);
  const t=(data||[]).find(r=>r.upd_date===d);
  M(`<h2>My Daily Update — ${d}</h2>
  <button class="btn" onclick='taskForm("${ME.employee.id}","${d}",${JSON.stringify(t||{}).replace(/'/g,"&#39;")})'>${t?'<i class="fa-solid fa-pen"></i> Edit today\'s update':'+ Post today\'s update'}</button>
  <div class="card" style="margin-top:12px"><table><tr><th>Date</th><th>Status</th><th>Client / Project</th><th>Completed</th><th>Blocker</th><th>Next Task</th></tr>
  ${(data||[]).map(r=>`<tr><td>${r.upd_date}</td><td>${r.update_status}</td><td>${esc(r.project)}</td><td>${esc(r.completed)}</td><td>${esc(r.blocker)}</td><td>${esc(r.next_task)}</td></tr>`).join('')}</table></div>`);
}
async function myatt(ym){
  if(!ME.employee)return mydash();
  const now=new Date();ym=ym||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const [y,m]=ym.split('-').map(Number);const dim=new Date(y,m,0).getDate();
  const{data}=await sb.from('attendance').select('*').eq('employee_id',ME.employee.id).gte('att_date',`${ym}-01`).lte('att_date',`${ym}-${dim}`).order('att_date');
  M(`<h2>My Attendance</h2><div class="row" style="margin-bottom:10px"><div style="max-width:180px"><label>Month</label><input type="month" value="${ym}" onchange="myatt(this.value)"></div></div>
  <div class="card"><table><tr><th>Date</th><th>Status</th><th>Entry</th><th>Exit</th><th>Remarks</th></tr>
  ${(data||[]).map(r=>`<tr><td>${r.att_date}</td><td><span class="badge st${r.status}">${r.status||''}</span></td>
  <td>${r.entry_time||''}</td><td>${r.exit_time||''}</td><td>${esc(r.remarks)}</td></tr>`).join('')}</table></div>`);
}
async function mywfh(){
  if(!ME.employee)return mydash();
  const{data}=await sb.from('wfh_leave').select('*').eq('employee_id',ME.employee.id).order('req_date',{ascending:false});
  M(`<h2>WFH / Leave Requests</h2>
  <div class="warnbar"><i class="fa-solid fa-triangle-exclamation" style="color:#E8682A"></i> Intimate before 8:00 AM. Only approved requests are valid.</div>
  <div class="card"><div class="row"><div><label>Date</label><input id="w_date" type="date" value="${today()}"></div>
  <div><label>Type</label><select id="w_status">${['WFH','Leave','Sick Leave','Emergency Leave','Half Day'].map(s=>`<option>${s}</option>`).join('')}</select></div>
  <div><label>Reason</label><input id="w_reason"></div><div><button class="btn" onclick="reqWfh()">Submit</button></div></div></div>
  <div class="card"><table><tr><th>Date</th><th>Type</th><th>Reason</th><th>Approved</th></tr>
  ${(data||[]).map(r=>`<tr><td>${r.req_date}</td><td>${r.status}</td><td>${esc(r.reason)}</td>
  <td><span class="badge ${r.approved==='Yes'?'stP':r.approved==='No'?'stA':'stL'}">${r.approved}</span></td></tr>`).join('')}</table></div>`);
}
async function reqWfh(){const{error}=await sb.from('wfh_leave').insert({employee_id:ME.employee.id,req_date:$('w_date').value,status:$('w_status').value,reason:$('w_reason').value||null});
  error?alert(error.message):mywfh()}
async function myslip(){
  if(!ME.employee)return mydash();
  const{data}=await sb.from('payroll').select('*').eq('employee_id',ME.employee.id).order('pay_year',{ascending:false}).order('pay_month',{ascending:false});
  M(`<h2>My Payslips</h2><div class="card"><table><tr><th>Month</th><th>Gross</th><th>Deductions</th><th>Net</th><th>Status</th><th></th></tr>
  ${(data||[]).map(r=>`<tr><td>${MONTHS[r.pay_month-1]} ${r.pay_year}</td><td>${inr(r.gross)}</td><td>${inr(r.total_deductions)}</td><td><b>${inr(r.net)}</b></td>
  <td><span class="badge ${r.pay_status==='Paid'?'stP':'stA'}">${r.pay_status||'Unpaid'}</span></td>
  <td><button class="btn sm" onclick="slip('${r.employee_id}',${r.pay_year},${r.pay_month})">View / Print</button></td></tr>`).join('')}</table></div>`);
}
boot();
</script>
